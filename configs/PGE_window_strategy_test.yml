# PGE_window_strategy_test.yml
#
# Config di test empirico per WindowStrategyFactory refactoring.
# Tre stream che esercitano le tre strategy principali:
#   S1 — SingleWindowStrategy   (envelope: stringa)
#   S2 — TransitionWindowStrategy (envelope: {from, to, curve})
#   S3 — MultiStateWindowStrategy (envelope: {states, curve})
#
# Parametri comuni:
#   density:  0.5  (un grano ogni ~2 secondi)
#   duration: 1.0s (grano lungo, involucro ben udibile)
#   durata stream: 60s

streams:

  # ---------------------------------------------------------------------------
  # S1 — SingleWindowStrategy
  # Sempre hanning. Riferimento: nessuna variazione di envelope.
  # ---------------------------------------------------------------------------
  - stream_id: "s1_single_hanning"
    onset: 0.0
    duration: 60.0
    sample: "sinus.wav"
    density: 0.5
    grain:
      duration: 1.0
      envelope: hanning

  # ---------------------------------------------------------------------------
  # S2 — TransitionWindowStrategy
  # Da hanning (morbido) a expodec (attacco netto) in 60 secondi.
  # Si sente lo spostamento progressivo del timbro dell'involucro.
  # ---------------------------------------------------------------------------
  - stream_id: "s2_transition_hanning_to_expodec"
    onset: 60.0
    duration: 60.0
    sample: "sinus.wav"
    density: 10
    grain:
      duration: .1
      envelope:
        from: hanning
        to: expodec
        curve: [[0, 0], [60, 1]]

  # ---------------------------------------------------------------------------
  # S3 — MultiStateWindowStrategy
  # Quattro stati: hanning → bartlett → gaussian → blackman
  # La curve percorre tutto l'arco in 60s.
  # ---------------------------------------------------------------------------
  - stream_id: "s3_multistate_four_windows"
    onset: 120.0
    duration: 60.0
    sample: "sinus.wav"
    density: 
      time_unit: normalized
      points: [[0,15],[.3,3],[.6,7],[.9,6],[1,2.4]]
    
    distribution:  {time_unit: normalized, points: [[[0, 0.0], [100, 1.0]], 60.0, 6, "linear", "exponential"]}
    grain:
      duration: 
        time_unit: normalized
        points: [[0,0.01],[.3,1],[.8,.1]]
      duration_range: 
        time_unit: normalized
        points: [[0,0.005],[.3,.1],[.8,.08]]
      envelope:
        states:
          - [0.0, hanning]
          - [0.33, bartlett]
          - [0.66, exporise]
          - [1.0, blackman]
        curve: [[0, 0], [60, 1]]
    voices:
      num_voices: 
        time_unit: normalized
        points: [[0,1],[.01,12],[.694,4],[.7,30]]
      pitch: {strategy: chord, chord: maj7}
      pan: {strategy: random, spread: 360}
      scatter:  [[[0, 0.0], [100, 1.0]], 60.0, 4]
      pointer: {strategy: stochastic, pointer_range: .2}
    volume: {time_unit: normalized, type: cubic, points: [[0,-20],[.85,-20],[1,-90]]}
    pitch:
      semitones: -12
    pan_range:  {time_unit: normalized, points: [[0, 60], [1,180]]}
    pointer:
      speed_ratio:  {type: cubic, points: [[0.0, 1], [30.0, .9], [60.0, .01]]}