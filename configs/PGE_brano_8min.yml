# =============================================================================
# PGE_brano_8min.yml
# "Dalla nebula al temporale" — brano acusmatico ~8 minuti
# =============================================================================
#
# FORMA IN 6 SEZIONI (100 stream sovrapposti):
#
#  I.   NEBULA          (0–65s)    — 8 stream
#       Grani isolati, quasi impercettibili. Materia primordiale.
#       grain_dur: 0.15–0.3s, ff: 0.8–1.5, speed: 0.001–0.003
#       Nessuna voce o 2 voci con intervalli microtonali.
#
#  II.  PRIME NUVOLE    (62–158s)  — 15 stream
#       Le prime aggregazioni. Distanza tra gli eventi. Apertura stereo.
#       grain_dur: 0.06–0.12s, ff: 1.5–2.0, speed: 0.002–0.008
#       2–4 voci con pitch emergente.
#
#  III. ADDENSAMENTO    (148–252s) — 20 stream
#       Le nuvole si intersecano. La materia si organizza.
#       grain_dur: 0.04–0.08s, ff: 2.0, speed: 0.005–0.015
#       4 voci, accordi, onset-offset come micro-canone.
#
#  IV.  TEMPORALE       (242–375s) — 30 stream
#       Massima densità. Deflagrazione timbrica.
#       grain_dur: 0.02–0.05s, ff: 2.0–2.5, speed: 0.015–0.06
#       Combo completi, spread stereo massimo.
#
#  V.   DISSOLUZIONE    (362–448s) — 15 stream
#       Il temporale si ritira. I parametri invertono il percorso.
#       grain_dur: 0.05–0.12s, ff: 1.5–2.0, speed: 0.005–0.03
#
#  VI.  SILENZIO        (440–482s) — 12 stream
#       Ritorno alla nebula. Grani sempre più radi e lunghi.
#       grain_dur: 0.15–0.5s, ff: 0.3–1.2, speed: 0.001–0.003
#
# NOTE COMPOSITIVE:
#   - stream sovrapposti: la "densità" del brano emerge dalla
#     somma degli stream attivi simultaneamente
#   - loop_start diversi: ogni stream legge una zona diversa del sample
#   - volume come envelope su alcuni stream per fade naturali
#   - speed_ratio come envelope in punti di transizione
#   - fill_factor < 1 nelle sezioni I e VI = grani con silenzio tra loro
# =============================================================================

