# =============================================================================
# PGE_12min.yml — "Strati" — brano acusmatico 12 minuti
# =============================================================================
#
# 9 SEZIONI, ~135 stream sovrapposti
#
# MATERIALE per sezione (sezioni adiacenti contrastanti):
#   S1  SPARSE (1-4)      → 001 family (tagli lunghi)        001 = grana lenta
#   S2  DENSE  (6-16)     → 002 family (tagli medi/lunghi)   CONTRASTO S1↔S2
#   S3  SPARSE (1-4)      → 003, 004, 005                    CONTRASTO S2↔S3
#   S4  MEDIUM (2-7)      → 008 family (tagli corti)         timbre diverso
#   S5  DENSE  (6-16)     → 006, 007, 009, 010               CONTRASTO S4↔S5
#   S6  MAXIMUM (≥20)     → 002 family (TUTTI i tagli corti) CLIMAX
#   S7  MEDIUM (2-7)      → 011, 012, 013                    DISCONTINUITÀ POST-CLIMAX
#   S8  DENSE  (6-16)     → 014, 015, 016 family             ricostruzione
#   S9  MEDIUM→SPARSE     → 001.wav, 002.wav (originali)     ritorno alle sorgenti
#
# "INVILUPPO VOCI": num_voices non supporta envelope →
#   simulato per strati: mono → 2v → 4v entrano in sequenza dentro ogni sezione
#
# PARAMETRI SPECIALI USATI:
#   duration_range: [[t0,v0],[t1,v1]] — variazione grano evolve nel tempo
#   pan_range: [[t0,v0],[t1,v1]]       — allargamento stereo progressivo
#   offset_range: [[t0,v0],[t1,v1]]    — jitter pointer cresce
#   volume: envelope                    — fade in/out naturali
#   distribution: 1                    — distribuzione Truax (irregolare)
#
# DENSITY=0.6 usato in S7 → IOT=1.67s, quasi silenzio tra i grani
#
# DISCONTINUITÀ PERCETTIVE principali:
#   S1→S2 : esplosione di densità (sparse→6-16), cambio materiale 001→002
#   S2→S3 : crollo a quasi-silenzio, 002 denso → 003-005 sparso
#   S6→S7 : dopo climax massimo, riduzione radicale + nuovo materiale
# =============================================================================

