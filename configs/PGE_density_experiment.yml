  # ===========================================================================
  # SEZIONE A — FILL_FACTOR = 1.0, NESSUNA VOCE (baseline mono)
  # Grain edge-to-edge: density = fill_factor / grain_duration
  # Variabile: grain_duration (densità implicita indicata nel commento)
  # ===========================================================================

  # A1: grain=0.1s → density≈10 — texture sparsa, grani percettibili
  - stream_id: "A1_ff1_d10equiv_novoice"
