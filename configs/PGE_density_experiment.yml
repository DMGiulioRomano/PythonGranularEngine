# =============================================================================
# PGE_density_experiment.yml
# Esperimento scientifico: comportamento del sistema multi-voice
# al variare di density e fill_factor
# =============================================================================
#
# DOMANDA DI RICERCA:
#   Come si comporta il modello multi-voice al variare di density?
#   Density è condivisa tra le voci: density=D con N voci → D×N grani/s totali.
#   fill_factor (sezione A/B) è anch'esso per-stream (non per-voce).
#
# STRUTTURA DELL'ESPERIMENTO:
#
#   SEZIONE A — fill_factor=1.0, nessuna voce (baseline)
#     Grain duration varia: 0.1s→0.003s → density implicita 10→333
#     Osservazione: grains edge-to-edge, come cambia la texture?
#
#   SEZIONE B — fill_factor=1.0, 4 voci, grain=0.01s (≈density 100)
#     Strategie singole e combo completo
#     Osservazione: voci con fill_factor=1 generano overlap intra-voce?
#
#   SEZIONE C — density ladder: pitch:step
#     density: 10 → 50 → 100 → 200 → 300
#     grain_duration: fissa a 0.01s (overlap ratio cresce con density)
#     step semitoni: cresce proporzionalmente con density
#
#   SEZIONE D — density ladder: onset_offset:linear
#     step temporale: cresce con density (esprime frazione di IOT)
#
#   SEZIONE E — density ladder: pointer:stochastic
#     pointer_range: cresce con density
#
#   SEZIONE F — density ladder: pitch:chord (fixed chord, density varia)
#     chord: dom7 fisso — osservazione: come cambia la densità armonica?
#
#   SEZIONE G — density ladder: pitch + onset (combo 2D)
#     Entrambi crescono con density
#
#   SEZIONE H — density ladder: combo completo (pitch + onset + pointer + pan)
#     Tutti i parametri crescono con density
#
# COSTANTI:
#   stream_duration: 8.0s
#   slot: 9.0s (8s stream + 1s gap)
#   sample: "pino2.wav"
#   num_voices (dove presente): 4
#
# TABELLA DENSITY LADDER (sezioni C-H):
#   Livello | density | grain_dur | IOT medio | fill_factor equiv | pitch_step
#   --------|---------|-----------|-----------|-------------------|----------
#   1       | 10      | 0.01s     | 100ms     | 0.10              | 1.5 st
#   2       | 50      | 0.01s     | 20ms      | 0.50              | 3.0 st
#   3       | 100     | 0.01s     | 10ms      | 1.00 ← edge-edge  | 5.0 st
#   4       | 200     | 0.01s     | 5ms       | 2.00 (overlap)    | 7.0 st
#   5       | 300     | 0.01s     | 3.3ms     | 3.03 (overlap)    | 12.0 st
# =============================================================================

composition:
  title: "Density Experiment — Multi-Voice Scientific Study"

