# =============================================================================
# PGE_ff2_rassegna.yml
# Rassegna sistematica: fill_factor=2, speed_ratio 0.002→0.3
# =============================================================================
#
# STRUTTURA: matrice 10×10 = 100 stream
#
#   ASSE ORIZZONTALE — speed_ratio (10 livelli):
#     G0=0.002  G1=0.005  G2=0.01  G3=0.02  G4=0.05
#     G5=0.1    G6=0.15   G7=0.2   G8=0.25  G9=0.3
#
#   ASSE VERTICALE — configurazione voce (10 config per gruppo):
#     01 novoice              — baseline mono
#     02 pitch:step=2         — cluster stretto
#     03 pitch:step=5         — cluster largo
#     04 pitch:chord=maj7     — accordo maggiore settima
#     05 pitch:chord=dom7     — accordo dominante
#     06 pitch:stochastic±6st — voci random
#     07 onset:linear 0.05s   — canone micro
#     08 pointer:stochastic   — dispersione sample
#     09 pitch:step + onset   — combo 2D
#     10 full combo           — tutti i parametri voce
#
# COSTANTI:
#   sample:        "001-0_0-3_0.wav"
#   fill_factor:   2.0   → density = 2 / grain_dur
#   grain_dur:     0.05s → density = 40 grain/s
#   duration:      15.0s
#   slot:          17.0s (15s + 2s gap)
#   volume:        -18
#   pan spread:    70° (dove presente)
#
# DENSITY / OVERLAP REFERENCE (grain_dur=0.05, ff=2):
#   IOT = 1/density = 0.025s → ogni grano inizia a metà del precedente
#
# SPEED_RATIO REFERENCE:
#   0.002 → pointer avanza 0.03  (3%)  del sample in 15s  ← quasi-freeze
#   0.005 → 0.075 (7.5%)
#   0.01  → 0.15  (15%)
#   0.02  → 0.30  (30%)
#   0.05  → 0.75  (75%)  ← quasi tutto il sample in 15s
#   0.1   → supera il sample (~1.5x) → entra il loop
#   0.15  → 2.25x
#   0.2   → 3.0x
#   0.25  → 3.75x
#   0.3   → 4.5x  ← lettura molto veloce, texture timbrica
#
# onset = stream_global_index * 17
# =============================================================================

